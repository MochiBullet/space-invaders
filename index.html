<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === ゲームエリア（上部） === */
        #gameArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 0;
            padding: 4px 4px 0;
        }
        #score {
            color: #0f0;
            font-size: 18px;
            padding: 4px 0;
            text-align: center;
            flex-shrink: 0;
        }
        #canvasWrapper {
            flex: 1;
            width: 100%;
            max-width: 600px;
            position: relative;
            min-height: 0;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #0f0;
            background: #000;
        }
        #message {
            color: #0f0;
            font-size: 14px;
            padding: 6px 0;
            text-align: center;
            flex-shrink: 0;
        }

        /* === コントローラー（下部固定） === */
        #controls {
            display: none;
            flex-shrink: 0;
            width: 100%;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid #222;
        }
        #controlsInner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 左側：方向ボタン */
        .dpad {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-dir {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            border: 3px solid #0f0;
            background: rgba(0, 255, 0, 0.08);
            color: #0f0;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.05s, transform 0.05s;
        }
        .btn-dir:active, .btn-dir.active {
            background: rgba(0, 255, 0, 0.35);
            transform: scale(0.93);
        }

        /* 中央：リスタート */
        .btn-restart {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #555;
            background: rgba(255, 255, 255, 0.05);
            color: #555;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
        }
        .btn-restart:active {
            background: rgba(255, 255, 0, 0.3);
            border-color: #ff0;
            color: #ff0;
        }

        /* 右側：発射ボタン */
        .btn-fire {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 3px solid #f44;
            background: rgba(255, 50, 50, 0.1);
            color: #f44;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.05s, transform 0.05s;
        }
        .btn-fire:active, .btn-fire.active {
            background: rgba(255, 50, 50, 0.4);
            transform: scale(0.93);
        }

        /* === タッチデバイスでコントローラー表示 === */
        @media (pointer: coarse) {
            #controls {
                display: block;
            }
            #message {
                display: none;
            }
        }

        /* === PC向け（コントローラー非表示） === */
        @media (pointer: fine) {
            #gameArea {
                justify-content: center;
                padding: 10px;
            }
            #canvasWrapper {
                flex: none;
                max-width: 600px;
                aspect-ratio: 6 / 5;
                width: 100%;
            }
        }

        /* === 横画面対策 === */
        @media (orientation: landscape) and (pointer: coarse) {
            #controls {
                padding: 8px 24px;
            }
            .btn-dir {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
            .btn-fire {
                width: 72px;
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="score">SCORE: 0</div>
        <div id="canvasWrapper">
            <canvas id="gameCanvas" width="600" height="500"></canvas>
        </div>
        <div id="message">Arrow keys to move / Space to fire / R to restart</div>
    </div>
    <div id="controls">
        <div id="controlsInner">
            <div class="dpad">
                <button class="btn-dir" id="btnLeft">&#9664;</button>
                <button class="btn-dir" id="btnRight">&#9654;</button>
            </div>
            <button class="btn-restart" id="btnRestart">R</button>
            <button class="btn-fire" id="btnFire">FIRE</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const messageElement = document.getElementById('message');

        // タッチデバイス判定
        const isTouchDevice = matchMedia('(pointer: coarse)').matches;

        // === サウンドシステム ===
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 発射音
        function playShoot() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 敵撃破音
        function playExplosion() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // ダメージ音
        function playHit() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // ゲームオーバー音
        function playGameOver() {
            if (!audioCtx) return;
            const notes = [200, 180, 160, 100];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.15);
                osc.start(audioCtx.currentTime + i * 0.15);
                osc.stop(audioCtx.currentTime + i * 0.15 + 0.15);
            });
        }

        // 勝利音
        function playWin() {
            if (!audioCtx) return;
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.12);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.2);
                osc.start(audioCtx.currentTime + i * 0.12);
                osc.stop(audioCtx.currentTime + i * 0.12 + 0.2);
            });
        }

        // スタート音
        function playStart() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // ボス登場音
        function playBossAppear() {
            if (!audioCtx) return;
            for (let i = 0; i < 3; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100 + i * 50, audioCtx.currentTime + i * 0.2);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime + i * 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.2 + 0.2);
                osc.start(audioCtx.currentTime + i * 0.2);
                osc.stop(audioCtx.currentTime + i * 0.2 + 0.2);
            }
        }

        // ボス撃破音
        function playBossDefeat() {
            if (!audioCtx) return;
            for (let i = 0; i < 8; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300 - i * 30, audioCtx.currentTime + i * 0.08);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime + i * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.1);
                osc.start(audioCtx.currentTime + i * 0.08);
                osc.stop(audioCtx.currentTime + i * 0.08 + 0.1);
            }
        }

        // ハート取得音
        function playHeart() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // ゲーム状態
        let score = 0;
        let gameOver = false;
        let gameWon = false;
        let gameStarted = false;
        let titleBlink = 0;
        const maxLives = 5;
        let lives = maxLives;
        let invincible = false;
        let invincibleTimer = 0;

        // プレイヤー
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 20,
            speed: 5,
            color: '#0f0'
        };

        // 弾
        let bullets = [];
        const bulletSpeed = 8;

        // インベーダー
        let invaders = [];
        const invaderCols = 8;
        const invaderWidth = 40;
        const invaderHeight = 30;
        let invaderDirection = 1;
        let invaderSpeed = 1;
        const totalEnemies = 100;
        let killCount = 0;
        let spawnedCount = 0;

        // インベーダーの弾
        let enemyBullets = [];
        const enemyBulletSpeed = 1.5;

        // ボス
        let boss = null;
        let bossPhase = false;
        const bossMaxHp = 100;
        let bossAttackTimer = 0;
        const bossAttackInterval = 180; // 約3秒

        // ハートアイテム
        let hearts = [];
        const heartSpeed = 2;
        let heartSpawnTimer = 0;

        // キー入力
        const keys = {
            left: false,
            right: false,
            space: false
        };

        // インベーダーを1行分生成
        function spawnRow(yPos) {
            const count = Math.min(invaderCols, totalEnemies - spawnedCount);
            for (let col = 0; col < count; col++) {
                invaders.push({
                    x: col * (invaderWidth + 15) + 50,
                    y: yPos,
                    width: invaderWidth,
                    height: invaderHeight,
                    alive: true
                });
                spawnedCount++;
            }
        }

        // インベーダー初期化（最初の3行）
        function initInvaders() {
            invaders = [];
            spawnedCount = 0;
            killCount = 0;
            for (let row = 0; row < 3; row++) {
                spawnRow(row * (invaderHeight + 10) + 40);
            }
        }

        // 倒された分を上から補充
        function replenishInvaders() {
            if (spawnedCount >= totalEnemies) return;
            const aliveInvaders = invaders.filter(inv => inv.alive);
            if (aliveInvaders.length < 16) {
                // 一番上の生存インベーダーのY座標を基準に、その上に出す
                let topY = canvas.height;
                aliveInvaders.forEach(inv => { if (inv.y < topY) topY = inv.y; });
                const newY = Math.max(topY - (invaderHeight + 10), -invaderHeight);
                spawnRow(newY);
            }
        }

        // タイトル画面描画
        function drawTitleScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // タイトル
            ctx.fillStyle = '#0f0';
            ctx.font = 'bold 44px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('SPACE', canvas.width / 2, 140);
            ctx.fillStyle = '#f00';
            ctx.fillText('INVADERS', canvas.width / 2, 190);

            // デモ用インベーダー描画
            const demoInvaders = [
                { x: 200, y: 240 }, { x: 270, y: 240 }, { x: 340, y: 240 },
                { x: 235, y: 280 }, { x: 305, y: 280 }
            ];
            demoInvaders.forEach(inv => {
                ctx.fillStyle = '#f00';
                ctx.fillRect(inv.x + 5, inv.y + 5, 30, 20);
                ctx.fillRect(inv.x, inv.y, 8, 8);
                ctx.fillRect(inv.x + 32, inv.y, 8, 8);
                ctx.fillRect(inv.x + 5, inv.y + 25, 8, 5);
                ctx.fillRect(inv.x + 27, inv.y + 25, 8, 5);
            });

            // 点滅するスタートメッセージ
            titleBlink += 0.05;
            if (Math.sin(titleBlink) > -0.3) {
                ctx.fillStyle = '#ff0';
                ctx.font = '22px Courier New';
                if (isTouchDevice) {
                    ctx.fillText('TAP TO START', canvas.width / 2, 380);
                } else {
                    ctx.fillText('PRESS SPACE TO START', canvas.width / 2, 380);
                }
            }

            // 操作説明
            ctx.fillStyle = '#888';
            ctx.font = '14px Courier New';
            if (isTouchDevice) {
                ctx.fillText('Use buttons below to play', canvas.width / 2, 440);
            } else {
                ctx.fillText('Arrow Keys: Move / Space: Fire / R: Restart', canvas.width / 2, 440);
            }

            ctx.textAlign = 'left';
        }

        // ゲームスタート
        function startGame() {
            if (!gameStarted) {
                initAudio();
                playStart();
                gameStarted = true;
                resetGame();
            }
        }

        // ゲームリセット
        function resetGame() {
            score = 0;
            gameOver = false;
            gameWon = false;
            killCount = 0;
            lives = maxLives;
            invincible = false;
            invincibleTimer = 0;
            player.x = canvas.width / 2 - 25;
            bullets = [];
            enemyBullets = [];
            invaderDirection = 1;
            invaderSpeed = 1;
            boss = null;
            bossPhase = false;
            bossAttackTimer = 0;
            hearts = [];
            heartSpawnTimer = 0;
            initInvaders();
            messageElement.textContent = 'Arrow keys to move / Space to fire / R to restart';
        }

        // プレイヤー描画
        function drawPlayer() {
            // 無敵中は点滅
            if (invincible && Math.floor(invincibleTimer / 4) % 2 === 0) return;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(player.x + 20, player.y - 10, 10, 10);
        }

        // ライフ表示
        function drawLives() {
            for (let i = 0; i < maxLives; i++) {
                const x = 10 + i * 22;
                const y = canvas.height - 18;
                if (i < lives) {
                    ctx.fillStyle = '#0f0';
                } else {
                    ctx.fillStyle = '#333';
                }
                // 小さな自機アイコン
                ctx.fillRect(x, y, 16, 6);
                ctx.fillRect(x + 6, y - 4, 4, 4);
            }
        }

        // インベーダー描画
        function drawInvaders() {
            invaders.forEach(invader => {
                if (invader.alive) {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(invader.x + 5, invader.y + 5, invader.width - 10, invader.height - 10);
                    ctx.fillRect(invader.x, invader.y, 8, 8);
                    ctx.fillRect(invader.x + invader.width - 8, invader.y, 8, 8);
                    ctx.fillRect(invader.x + 5, invader.y + invader.height - 5, 8, 5);
                    ctx.fillRect(invader.x + invader.width - 13, invader.y + invader.height - 5, 8, 5);
                }
            });
        }

        // 弾描画
        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });

            ctx.fillStyle = '#f0f';
            enemyBullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });
        }

        // ボス出現
        function spawnBoss() {
            bossPhase = true;
            boss = {
                x: canvas.width / 2 - 75,
                y: 30,
                width: 150,
                height: 80,
                hp: bossMaxHp,
                direction: 1,
                speed: 0.5
            };
            invaders = [];
            enemyBullets = [];
            playBossAppear();
        }

        // ボス描画
        function drawBoss() {
            if (!boss) return;

            // 本体（大きな四角）
            ctx.fillStyle = '#f0f';
            ctx.fillRect(boss.x + 20, boss.y + 20, boss.width - 40, boss.height - 30);

            // 上部の突起
            ctx.fillRect(boss.x + 10, boss.y, 30, 25);
            ctx.fillRect(boss.x + boss.width - 40, boss.y, 30, 25);
            ctx.fillRect(boss.x + 60, boss.y + 5, 30, 20);

            // 目
            ctx.fillStyle = '#fff';
            ctx.fillRect(boss.x + 40, boss.y + 35, 20, 15);
            ctx.fillRect(boss.x + 90, boss.y + 35, 20, 15);
            ctx.fillStyle = '#f00';
            ctx.fillRect(boss.x + 45, boss.y + 40, 10, 10);
            ctx.fillRect(boss.x + 95, boss.y + 40, 10, 10);

            // 下部の足
            ctx.fillStyle = '#f0f';
            ctx.fillRect(boss.x, boss.y + 60, 25, 20);
            ctx.fillRect(boss.x + 40, boss.y + 65, 20, 15);
            ctx.fillRect(boss.x + 90, boss.y + 65, 20, 15);
            ctx.fillRect(boss.x + boss.width - 25, boss.y + 60, 25, 20);

            // HPバー
            const hpBarWidth = 140;
            const hpRatio = boss.hp / bossMaxHp;
            ctx.fillStyle = '#333';
            ctx.fillRect(boss.x + 5, boss.y - 15, hpBarWidth, 10);
            ctx.fillStyle = hpRatio > 0.3 ? '#0f0' : '#f00';
            ctx.fillRect(boss.x + 5, boss.y - 15, hpBarWidth * hpRatio, 10);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(boss.x + 5, boss.y - 15, hpBarWidth, 10);
        }

        // ボス移動
        function moveBoss() {
            if (!boss) return;
            boss.x += boss.speed * boss.direction;
            if (boss.x <= 10 || boss.x + boss.width >= canvas.width - 10) {
                boss.direction *= -1;
            }
        }

        // ボス攻撃（弾をまき散らす）
        function bossAttack() {
            if (!boss) return;
            bossAttackTimer++;
            if (bossAttackTimer >= bossAttackInterval) {
                bossAttackTimer = 0;
                // 8方向に弾を発射
                const centerX = boss.x + boss.width / 2;
                const centerY = boss.y + boss.height;
                for (let i = 0; i < 12; i++) {
                    const angle = (Math.PI / 12) * i + Math.PI / 12;
                    enemyBullets.push({
                        x: centerX,
                        y: centerY,
                        vx: Math.cos(angle) * 2,
                        vy: Math.sin(angle) * 2.5,
                        isBossBullet: true
                    });
                }
            }
        }

        // ハート生成
        function spawnHeart() {
            heartSpawnTimer++;
            // 約5秒に1回ハートを生成
            if (heartSpawnTimer >= 300) {
                heartSpawnTimer = 0;
                if (Math.random() < 0.5) {
                    hearts.push({
                        x: Math.random() * (canvas.width - 30) + 15,
                        y: -20,
                        size: 20
                    });
                }
            }
        }

        // ハート描画
        function drawHearts() {
            hearts.forEach(heart => {
                ctx.fillStyle = '#f55';
                // ハート形を描画
                const x = heart.x;
                const y = heart.y;
                const s = heart.size;
                ctx.beginPath();
                ctx.moveTo(x, y + s * 0.3);
                ctx.bezierCurveTo(x, y, x - s * 0.5, y, x - s * 0.5, y + s * 0.3);
                ctx.bezierCurveTo(x - s * 0.5, y + s * 0.6, x, y + s * 0.9, x, y + s);
                ctx.bezierCurveTo(x, y + s * 0.9, x + s * 0.5, y + s * 0.6, x + s * 0.5, y + s * 0.3);
                ctx.bezierCurveTo(x + s * 0.5, y, x, y, x, y + s * 0.3);
                ctx.fill();
            });
        }

        // ハート移動
        function moveHearts() {
            hearts = hearts.filter(heart => {
                heart.y += heartSpeed;
                return heart.y < canvas.height + 30;
            });
        }

        // プレイヤー移動
        function movePlayer() {
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        // 弾移動
        function moveBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > 0;
            });

            enemyBullets = enemyBullets.filter(bullet => {
                if (bullet.isBossBullet) {
                    bullet.x += bullet.vx;
                    bullet.y += bullet.vy;
                    return bullet.y < canvas.height && bullet.x > 0 && bullet.x < canvas.width;
                } else {
                    bullet.y += enemyBulletSpeed;
                    return bullet.y < canvas.height;
                }
            });
        }

        // インベーダー移動
        function moveInvaders() {
            let shouldDescend = false;

            invaders.forEach(invader => {
                if (invader.alive) {
                    invader.x += invaderSpeed * invaderDirection;
                    if (invader.x <= 0 || invader.x + invader.width >= canvas.width) {
                        shouldDescend = true;
                    }
                }
            });

            if (shouldDescend) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    invader.y += 20;
                    if (invader.alive && invader.y + invader.height >= player.y && !gameOver) {
                        gameOver = true; // 敵が到達したら即死
                        playGameOver();
                    }
                });
            }
        }

        // インベーダーの攻撃
        function invaderShoot() {
            const aliveInvaders = invaders.filter(inv => inv.alive);
            if (aliveInvaders.length > 0 && Math.random() < 0.02) {
                const shooter = aliveInvaders[Math.floor(Math.random() * aliveInvaders.length)];
                enemyBullets.push({
                    x: shooter.x + shooter.width / 2,
                    y: shooter.y + shooter.height
                });
            }
        }

        // 衝突判定
        function checkCollisions() {
            let enemyKilled = false;

            // ボス戦の場合
            if (bossPhase && boss) {
                bullets.forEach((bullet, bulletIndex) => {
                    if (bullet.x < boss.x + boss.width &&
                        bullet.x + 4 > boss.x &&
                        bullet.y < boss.y + boss.height &&
                        bullet.y + 15 > boss.y) {
                        bullets.splice(bulletIndex, 1);
                        boss.hp--;
                        score += 10;
                        if (boss.hp <= 0) {
                            // ボス撃破
                            playBossDefeat();
                            score += 5000;
                            boss = null;
                            bossPhase = false;
                            gameWon = true;
                            playWin();
                        } else {
                            playExplosion();
                        }
                    }
                });
            } else {
                // 通常の敵
                bullets.forEach((bullet, bulletIndex) => {
                    invaders.forEach(invader => {
                        if (invader.alive &&
                            bullet.x < invader.x + invader.width &&
                            bullet.x + 4 > invader.x &&
                            bullet.y < invader.y + invader.height &&
                            bullet.y + 15 > invader.y) {
                            invader.alive = false;
                            bullets.splice(bulletIndex, 1);
                            score += 100;
                            killCount++;
                            enemyKilled = true;
                        }
                    });
                });
                if (enemyKilled) playExplosion();

                // 死んだインベーダーを配列から除去
                invaders = invaders.filter(inv => inv.alive);

                // 100体倒したらボス出現
                if (killCount >= totalEnemies && !bossPhase) {
                    spawnBoss();
                }
            }

            // プレイヤーへのダメージ判定
            if (!invincible) {
                enemyBullets.forEach((bullet, index) => {
                    if (bullet.x < player.x + player.width &&
                        bullet.x + 4 > player.x &&
                        bullet.y < player.y + player.height &&
                        bullet.y + 15 > player.y) {
                        lives--;
                        score = Math.floor(score / 2); // ダメージでスコア半分
                        enemyBullets.splice(index, 1);
                        if (lives <= 0) {
                            gameOver = true;
                            playGameOver();
                        } else {
                            invincible = true;
                            invincibleTimer = 90;
                            playHit();
                        }
                    }
                });
            }

            // ハート取得判定
            hearts.forEach((heart, index) => {
                const hx = heart.x;
                const hy = heart.y;
                const px = player.x + player.width / 2;
                const py = player.y + player.height / 2;
                const dist = Math.sqrt((hx - px) ** 2 + (hy - py) ** 2);
                if (dist < 30) {
                    hearts.splice(index, 1);
                    if (lives < maxLives) {
                        lives++;
                        playHeart();
                    }
                }
            });
        }

        // 弾を発射
        function fireBullet() {
            if (!gameOver && !gameWon && gameStarted) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y - 15
                });
                playShoot();
            }
        }

        // ゲームループ
        function gameLoop() {
            if (!gameStarted) {
                drawTitleScreen();
                scoreElement.textContent = 'SPACE INVADERS';
                messageElement.textContent = isTouchDevice ? 'Tap to start' : 'Press Space to start';
                requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameOver && !gameWon) {
                movePlayer();
                moveBullets();
                moveHearts();
                spawnHeart();

                if (bossPhase && boss) {
                    moveBoss();
                    bossAttack();
                } else {
                    moveInvaders();
                    invaderShoot();
                    replenishInvaders();
                }

                checkCollisions();

                // 無敵タイマー
                if (invincible) {
                    invincibleTimer--;
                    if (invincibleTimer <= 0) {
                        invincible = false;
                    }
                }
            }

            drawPlayer();
            if (bossPhase) {
                drawBoss();
            } else {
                drawInvaders();
            }
            drawBullets();
            drawHearts();

            // ライフ表示
            drawLives();

            // スコア表示
            if (bossPhase && boss) {
                scoreElement.textContent = `SCORE: ${score}  BOSS HP: ${boss.hp}/${bossMaxHp}`;
            } else if (bossPhase) {
                scoreElement.textContent = `SCORE: ${score}`;
            } else {
                scoreElement.textContent = `SCORE: ${score}  [${killCount}/${totalEnemies}]`;
            }

            if (gameOver) {
                ctx.fillStyle = '#f00';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
                messageElement.textContent = 'R to restart';
            } else if (gameWon) {
                ctx.fillStyle = '#0f0';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2);
                ctx.font = '24px Courier New';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
                ctx.textAlign = 'left';
                messageElement.textContent = 'R to restart';
            }

            requestAnimationFrame(gameLoop);
        }

        // === キーボード操作 ===
        let canShoot = true;
        document.addEventListener('keydown', (e) => {
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    startGame();
                }
                e.preventDefault();
                return;
            }
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ' && canShoot) {
                fireBullet();
                canShoot = false;
            }
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            }
            e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === ' ') canShoot = true;
        });

        // === タッチ操作 ===
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnFire = document.getElementById('btnFire');
        const btnRestart = document.getElementById('btnRestart');

        function addDirTouch(btn, keyName) {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyName] = true;
                btn.classList.add('active');
            }, { passive: false });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('active');
            }, { passive: false });
            btn.addEventListener('touchcancel', () => {
                keys[keyName] = false;
                btn.classList.remove('active');
            });
        }

        addDirTouch(btnLeft, 'left');
        addDirTouch(btnRight, 'right');

        // 発射ボタン（連打対応）
        btnFire.addEventListener('touchstart', (e) => {
            e.preventDefault();
            btnFire.classList.add('active');
            fireBullet();
        }, { passive: false });
        btnFire.addEventListener('touchend', (e) => {
            e.preventDefault();
            btnFire.classList.remove('active');
        }, { passive: false });

        // リスタート
        btnRestart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        }, { passive: false });

        // マウス操作（PC用）
        btnLeft.addEventListener('mousedown', () => keys.left = true);
        btnLeft.addEventListener('mouseup', () => keys.left = false);
        btnLeft.addEventListener('mouseleave', () => keys.left = false);
        btnRight.addEventListener('mousedown', () => keys.right = true);
        btnRight.addEventListener('mouseup', () => keys.right = false);
        btnRight.addEventListener('mouseleave', () => keys.right = false);
        btnFire.addEventListener('click', fireBullet);
        btnRestart.addEventListener('click', resetGame);

        // タッチでスタート
        canvas.addEventListener('click', () => {
            if (!gameStarted) startGame();
        });
        canvas.addEventListener('touchstart', (e) => {
            if (!gameStarted) {
                e.preventDefault();
                startGame();
            }
        }, { passive: false });

        // ページスクロール・ズーム完全防止
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gesturestart', (e) => e.preventDefault());

        // ゲーム開始
        gameLoop();
    </script>
</body>
</html>
