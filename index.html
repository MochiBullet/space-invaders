<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameContainer {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 10px;
        }
        #score {
            color: #0f0;
            font-size: clamp(18px, 5vw, 24px);
            margin-bottom: 10px;
        }
        #canvasWrapper {
            position: relative;
            width: 100%;
            padding-bottom: 83.33%;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #0f0;
            background: #000;
        }
        #message {
            color: #0f0;
            font-size: clamp(12px, 3vw, 16px);
            margin-top: 10px;
            min-height: 20px;
        }
        #controls {
            display: none;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            padding: 0 10px;
        }
        .control-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #0f0;
            background: rgba(0, 255, 0, 0.1);
            color: #0f0;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
        }
        .btn:active, .btn.active {
            background: rgba(0, 255, 0, 0.4);
        }
        .btn-fire {
            width: 90px;
            height: 90px;
            border-color: #f00;
            background: rgba(255, 0, 0, 0.1);
            color: #f00;
            font-size: 16px;
        }
        .btn-fire:active, .btn-fire.active {
            background: rgba(255, 0, 0, 0.4);
        }
        .btn-restart {
            width: 50px;
            height: 50px;
            font-size: 20px;
            border-color: #ff0;
            background: rgba(255, 255, 0, 0.1);
            color: #ff0;
        }
        .btn-restart:active {
            background: rgba(255, 255, 0, 0.4);
        }
        @media (pointer: coarse) {
            #controls {
                display: flex;
            }
            #message {
                display: none;
            }
        }
        @media (max-width: 400px) {
            .btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .btn-fire {
                width: 75px;
                height: 75px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">SCORE: 0</div>
        <div id="canvasWrapper">
            <canvas id="gameCanvas" width="600" height="500"></canvas>
        </div>
        <div id="message">Arrow keys to move / Space to fire / R to restart</div>
    </div>
    <div id="controls">
        <div class="control-group">
            <button class="btn" id="btnLeft">&#9664;</button>
            <button class="btn" id="btnRight">&#9654;</button>
        </div>
        <button class="btn btn-restart" id="btnRestart">R</button>
        <button class="btn btn-fire" id="btnFire">FIRE</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const messageElement = document.getElementById('message');

        // ゲーム状態
        let score = 0;
        let gameOver = false;
        let gameWon = false;

        // プレイヤー
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 20,
            speed: 7,
            color: '#0f0'
        };

        // 弾
        let bullets = [];
        const bulletSpeed = 8;

        // インベーダー
        let invaders = [];
        const invaderRows = 4;
        const invaderCols = 8;
        const invaderWidth = 40;
        const invaderHeight = 30;
        let invaderDirection = 1;
        let invaderSpeed = 1;

        // インベーダーの弾
        let enemyBullets = [];
        const enemyBulletSpeed = 4;

        // キー入力
        const keys = {
            left: false,
            right: false,
            space: false
        };

        // インベーダー初期化
        function initInvaders() {
            invaders = [];
            for (let row = 0; row < invaderRows; row++) {
                for (let col = 0; col < invaderCols; col++) {
                    invaders.push({
                        x: col * (invaderWidth + 15) + 50,
                        y: row * (invaderHeight + 10) + 40,
                        width: invaderWidth,
                        height: invaderHeight,
                        alive: true
                    });
                }
            }
        }

        // ゲームリセット
        function resetGame() {
            score = 0;
            gameOver = false;
            gameWon = false;
            player.x = canvas.width / 2 - 25;
            bullets = [];
            enemyBullets = [];
            invaderDirection = 1;
            invaderSpeed = 1;
            initInvaders();
            messageElement.textContent = 'Arrow keys to move / Space to fire / R to restart';
        }

        // プレイヤー描画
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(player.x + 20, player.y - 10, 10, 10);
        }

        // インベーダー描画
        function drawInvaders() {
            invaders.forEach(invader => {
                if (invader.alive) {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(invader.x + 5, invader.y + 5, invader.width - 10, invader.height - 10);
                    ctx.fillRect(invader.x, invader.y, 8, 8);
                    ctx.fillRect(invader.x + invader.width - 8, invader.y, 8, 8);
                    ctx.fillRect(invader.x + 5, invader.y + invader.height - 5, 8, 5);
                    ctx.fillRect(invader.x + invader.width - 13, invader.y + invader.height - 5, 8, 5);
                }
            });
        }

        // 弾描画
        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });

            ctx.fillStyle = '#f0f';
            enemyBullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });
        }

        // プレイヤー移動
        function movePlayer() {
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        // 弾移動
        function moveBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > 0;
            });

            enemyBullets = enemyBullets.filter(bullet => {
                bullet.y += enemyBulletSpeed;
                return bullet.y < canvas.height;
            });
        }

        // インベーダー移動
        function moveInvaders() {
            let shouldDescend = false;

            invaders.forEach(invader => {
                if (invader.alive) {
                    invader.x += invaderSpeed * invaderDirection;
                    if (invader.x <= 0 || invader.x + invader.width >= canvas.width) {
                        shouldDescend = true;
                    }
                }
            });

            if (shouldDescend) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    invader.y += 20;
                    if (invader.alive && invader.y + invader.height >= player.y) {
                        gameOver = true;
                    }
                });
            }
        }

        // インベーダーの攻撃
        function invaderShoot() {
            const aliveInvaders = invaders.filter(inv => inv.alive);
            if (aliveInvaders.length > 0 && Math.random() < 0.02) {
                const shooter = aliveInvaders[Math.floor(Math.random() * aliveInvaders.length)];
                enemyBullets.push({
                    x: shooter.x + shooter.width / 2,
                    y: shooter.y + shooter.height
                });
            }
        }

        // 衝突判定
        function checkCollisions() {
            bullets.forEach((bullet, bulletIndex) => {
                invaders.forEach(invader => {
                    if (invader.alive &&
                        bullet.x < invader.x + invader.width &&
                        bullet.x + 4 > invader.x &&
                        bullet.y < invader.y + invader.height &&
                        bullet.y + 15 > invader.y) {
                        invader.alive = false;
                        bullets.splice(bulletIndex, 1);
                        score += 100;
                    }
                });
            });

            enemyBullets.forEach((bullet, index) => {
                if (bullet.x < player.x + player.width &&
                    bullet.x + 4 > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + 15 > player.y) {
                    gameOver = true;
                }
            });

            if (invaders.every(inv => !inv.alive)) {
                gameWon = true;
            }
        }

        // ゲームループ
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameOver && !gameWon) {
                movePlayer();
                moveBullets();
                moveInvaders();
                invaderShoot();
                checkCollisions();
            }

            drawPlayer();
            drawInvaders();
            drawBullets();

            scoreElement.textContent = `SCORE: ${score}`;

            if (gameOver) {
                ctx.fillStyle = '#f00';
                ctx.font = '48px Courier New';
                ctx.fillText('GAME OVER', canvas.width / 2 - 130, canvas.height / 2);
                messageElement.textContent = 'R to restart';
            } else if (gameWon) {
                ctx.fillStyle = '#0f0';
                ctx.font = '48px Courier New';
                ctx.fillText('YOU WIN!', canvas.width / 2 - 100, canvas.height / 2);
                messageElement.textContent = 'R to restart';
            }

            requestAnimationFrame(gameLoop);
        }

        // キーイベント
        let canShoot = true;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ' && canShoot && !gameOver && !gameWon) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y - 15
                });
                canShoot = false;
            }
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            }
            e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === ' ') canShoot = true;
        });

        // タッチ操作
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnFire = document.getElementById('btnFire');
        const btnRestart = document.getElementById('btnRestart');

        function addTouchEvents(btn, keyName) {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyName] = true;
                btn.classList.add('active');
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('active');
            });
            btn.addEventListener('touchcancel', (e) => {
                keys[keyName] = false;
                btn.classList.remove('active');
            });
        }

        addTouchEvents(btnLeft, 'left');
        addTouchEvents(btnRight, 'right');

        btnFire.addEventListener('touchstart', (e) => {
            e.preventDefault();
            btnFire.classList.add('active');
            if (!gameOver && !gameWon) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y - 15
                });
            }
        });
        btnFire.addEventListener('touchend', (e) => {
            e.preventDefault();
            btnFire.classList.remove('active');
        });

        btnRestart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        });

        // マウスでも操作可能に（タッチデバイスのテスト用）
        btnLeft.addEventListener('mousedown', () => keys.left = true);
        btnLeft.addEventListener('mouseup', () => keys.left = false);
        btnLeft.addEventListener('mouseleave', () => keys.left = false);
        btnRight.addEventListener('mousedown', () => keys.right = true);
        btnRight.addEventListener('mouseup', () => keys.right = false);
        btnRight.addEventListener('mouseleave', () => keys.right = false);
        btnFire.addEventListener('click', () => {
            if (!gameOver && !gameWon) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y - 15
                });
            }
        });
        btnRestart.addEventListener('click', resetGame);

        // ゲーム開始
        initInvaders();
        gameLoop();
    </script>
</body>
</html>
