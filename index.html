<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === ゲームエリア（上部） === */
        #gameArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 0;
            padding: 4px 4px 0;
        }
        #score {
            color: #0f0;
            font-size: 18px;
            padding: 4px 0;
            text-align: center;
            flex-shrink: 0;
        }
        #canvasWrapper {
            flex: 1;
            width: 100%;
            max-width: 600px;
            position: relative;
            min-height: 0;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #0f0;
            background: #000;
        }
        #message {
            color: #0f0;
            font-size: 14px;
            padding: 6px 0;
            text-align: center;
            flex-shrink: 0;
        }

        /* === コントローラー（下部固定） === */
        #controls {
            display: none;
            flex-shrink: 0;
            width: 100%;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid #222;
        }
        #controlsInner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 左側：方向ボタン */
        .dpad {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-dir {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            border: 3px solid #0f0;
            background: rgba(0, 255, 0, 0.08);
            color: #0f0;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.05s, transform 0.05s;
        }
        .btn-dir:active, .btn-dir.active {
            background: rgba(0, 255, 0, 0.35);
            transform: scale(0.93);
        }

        /* 中央：リスタート */
        .btn-restart {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #555;
            background: rgba(255, 255, 255, 0.05);
            color: #555;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
        }
        .btn-restart:active {
            background: rgba(255, 255, 0, 0.3);
            border-color: #ff0;
            color: #ff0;
        }

        /* 右側：発射ボタン */
        .btn-fire {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 3px solid #f44;
            background: rgba(255, 50, 50, 0.1);
            color: #f44;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.05s, transform 0.05s;
        }
        .btn-fire:active, .btn-fire.active {
            background: rgba(255, 50, 50, 0.4);
            transform: scale(0.93);
        }

        /* === タッチデバイスでコントローラー表示 === */
        @media (pointer: coarse) {
            #controls {
                display: block;
            }
            #message {
                display: none;
            }
        }

        /* === PC向け（コントローラー非表示） === */
        @media (pointer: fine) {
            #gameArea {
                justify-content: center;
                padding: 10px;
            }
            #canvasWrapper {
                flex: none;
                max-width: 600px;
                aspect-ratio: 6 / 5;
                width: 100%;
            }
        }

        /* === 横画面対策 === */
        @media (orientation: landscape) and (pointer: coarse) {
            #controls {
                padding: 8px 24px;
            }
            .btn-dir {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
            .btn-fire {
                width: 72px;
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="score">SCORE: 0</div>
        <div id="canvasWrapper">
            <canvas id="gameCanvas" width="600" height="500"></canvas>
        </div>
        <div id="message">Arrow keys to move / Space to fire / R to restart</div>
    </div>
    <div id="controls">
        <div id="controlsInner">
            <div class="dpad">
                <button class="btn-dir" id="btnLeft">&#9664;</button>
                <button class="btn-dir" id="btnRight">&#9654;</button>
            </div>
            <button class="btn-restart" id="btnRestart">R</button>
            <button class="btn-fire" id="btnFire">FIRE</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const messageElement = document.getElementById('message');

        // タッチデバイス判定
        const isTouchDevice = matchMedia('(pointer: coarse)').matches;

        // ゲーム状態
        let score = 0;
        let gameOver = false;
        let gameWon = false;
        let gameStarted = false;
        let titleBlink = 0;
        const maxLives = 5;
        let lives = maxLives;
        let invincible = false;
        let invincibleTimer = 0;

        // プレイヤー
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 20,
            speed: 5,
            color: '#0f0'
        };

        // 弾
        let bullets = [];
        const bulletSpeed = 8;

        // インベーダー
        let invaders = [];
        const invaderCols = 8;
        const invaderWidth = 40;
        const invaderHeight = 30;
        let invaderDirection = 1;
        let invaderSpeed = 1;
        const totalEnemies = 100;
        let killCount = 0;
        let spawnedCount = 0;

        // インベーダーの弾
        let enemyBullets = [];
        const enemyBulletSpeed = 1.5;

        // キー入力
        const keys = {
            left: false,
            right: false,
            space: false
        };

        // インベーダーを1行分生成
        function spawnRow(yPos) {
            const count = Math.min(invaderCols, totalEnemies - spawnedCount);
            for (let col = 0; col < count; col++) {
                invaders.push({
                    x: col * (invaderWidth + 15) + 50,
                    y: yPos,
                    width: invaderWidth,
                    height: invaderHeight,
                    alive: true
                });
                spawnedCount++;
            }
        }

        // インベーダー初期化（最初の3行）
        function initInvaders() {
            invaders = [];
            spawnedCount = 0;
            killCount = 0;
            for (let row = 0; row < 3; row++) {
                spawnRow(row * (invaderHeight + 10) + 40);
            }
        }

        // 倒された分を上から補充
        function replenishInvaders() {
            if (spawnedCount >= totalEnemies) return;
            const aliveInvaders = invaders.filter(inv => inv.alive);
            if (aliveInvaders.length < 16) {
                // 一番上の生存インベーダーのY座標を基準に、その上に出す
                let topY = canvas.height;
                aliveInvaders.forEach(inv => { if (inv.y < topY) topY = inv.y; });
                const newY = Math.max(topY - (invaderHeight + 10), -invaderHeight);
                spawnRow(newY);
            }
        }

        // タイトル画面描画
        function drawTitleScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // タイトル
            ctx.fillStyle = '#0f0';
            ctx.font = 'bold 44px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('SPACE', canvas.width / 2, 140);
            ctx.fillStyle = '#f00';
            ctx.fillText('INVADERS', canvas.width / 2, 190);

            // デモ用インベーダー描画
            const demoInvaders = [
                { x: 200, y: 240 }, { x: 270, y: 240 }, { x: 340, y: 240 },
                { x: 235, y: 280 }, { x: 305, y: 280 }
            ];
            demoInvaders.forEach(inv => {
                ctx.fillStyle = '#f00';
                ctx.fillRect(inv.x + 5, inv.y + 5, 30, 20);
                ctx.fillRect(inv.x, inv.y, 8, 8);
                ctx.fillRect(inv.x + 32, inv.y, 8, 8);
                ctx.fillRect(inv.x + 5, inv.y + 25, 8, 5);
                ctx.fillRect(inv.x + 27, inv.y + 25, 8, 5);
            });

            // 点滅するスタートメッセージ
            titleBlink += 0.05;
            if (Math.sin(titleBlink) > -0.3) {
                ctx.fillStyle = '#ff0';
                ctx.font = '22px Courier New';
                if (isTouchDevice) {
                    ctx.fillText('TAP TO START', canvas.width / 2, 380);
                } else {
                    ctx.fillText('PRESS SPACE TO START', canvas.width / 2, 380);
                }
            }

            // 操作説明
            ctx.fillStyle = '#888';
            ctx.font = '14px Courier New';
            if (isTouchDevice) {
                ctx.fillText('Use buttons below to play', canvas.width / 2, 440);
            } else {
                ctx.fillText('Arrow Keys: Move / Space: Fire / R: Restart', canvas.width / 2, 440);
            }

            ctx.textAlign = 'left';
        }

        // ゲームスタート
        function startGame() {
            if (!gameStarted) {
                gameStarted = true;
                resetGame();
            }
        }

        // ゲームリセット
        function resetGame() {
            score = 0;
            gameOver = false;
            gameWon = false;
            killCount = 0;
            lives = maxLives;
            invincible = false;
            invincibleTimer = 0;
            player.x = canvas.width / 2 - 25;
            bullets = [];
            enemyBullets = [];
            invaderDirection = 1;
            invaderSpeed = 1;
            initInvaders();
            messageElement.textContent = 'Arrow keys to move / Space to fire / R to restart';
        }

        // プレイヤー描画
        function drawPlayer() {
            // 無敵中は点滅
            if (invincible && Math.floor(invincibleTimer / 4) % 2 === 0) return;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(player.x + 20, player.y - 10, 10, 10);
        }

        // ライフ表示
        function drawLives() {
            for (let i = 0; i < maxLives; i++) {
                const x = 10 + i * 22;
                const y = canvas.height - 18;
                if (i < lives) {
                    ctx.fillStyle = '#0f0';
                } else {
                    ctx.fillStyle = '#333';
                }
                // 小さな自機アイコン
                ctx.fillRect(x, y, 16, 6);
                ctx.fillRect(x + 6, y - 4, 4, 4);
            }
        }

        // インベーダー描画
        function drawInvaders() {
            invaders.forEach(invader => {
                if (invader.alive) {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(invader.x + 5, invader.y + 5, invader.width - 10, invader.height - 10);
                    ctx.fillRect(invader.x, invader.y, 8, 8);
                    ctx.fillRect(invader.x + invader.width - 8, invader.y, 8, 8);
                    ctx.fillRect(invader.x + 5, invader.y + invader.height - 5, 8, 5);
                    ctx.fillRect(invader.x + invader.width - 13, invader.y + invader.height - 5, 8, 5);
                }
            });
        }

        // 弾描画
        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });

            ctx.fillStyle = '#f0f';
            enemyBullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });
        }

        // プレイヤー移動
        function movePlayer() {
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
        }

        // 弾移動
        function moveBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > 0;
            });

            enemyBullets = enemyBullets.filter(bullet => {
                bullet.y += enemyBulletSpeed;
                return bullet.y < canvas.height;
            });
        }

        // インベーダー移動
        function moveInvaders() {
            let shouldDescend = false;

            invaders.forEach(invader => {
                if (invader.alive) {
                    invader.x += invaderSpeed * invaderDirection;
                    if (invader.x <= 0 || invader.x + invader.width >= canvas.width) {
                        shouldDescend = true;
                    }
                }
            });

            if (shouldDescend) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    invader.y += 20;
                    if (invader.alive && invader.y + invader.height >= player.y) {
                        gameOver = true; // 敵が到達したら即死
                    }
                });
            }
        }

        // インベーダーの攻撃
        function invaderShoot() {
            const aliveInvaders = invaders.filter(inv => inv.alive);
            if (aliveInvaders.length > 0 && Math.random() < 0.02) {
                const shooter = aliveInvaders[Math.floor(Math.random() * aliveInvaders.length)];
                enemyBullets.push({
                    x: shooter.x + shooter.width / 2,
                    y: shooter.y + shooter.height
                });
            }
        }

        // 衝突判定
        function checkCollisions() {
            bullets.forEach((bullet, bulletIndex) => {
                invaders.forEach(invader => {
                    if (invader.alive &&
                        bullet.x < invader.x + invader.width &&
                        bullet.x + 4 > invader.x &&
                        bullet.y < invader.y + invader.height &&
                        bullet.y + 15 > invader.y) {
                        invader.alive = false;
                        bullets.splice(bulletIndex, 1);
                        score += 100;
                        killCount++;
                    }
                });
            });

            // 死んだインベーダーを配列から除去（メモリ節約）
            invaders = invaders.filter(inv => inv.alive);

            if (!invincible) {
                enemyBullets.forEach((bullet, index) => {
                    if (bullet.x < player.x + player.width &&
                        bullet.x + 4 > player.x &&
                        bullet.y < player.y + player.height &&
                        bullet.y + 15 > player.y) {
                        lives--;
                        enemyBullets.splice(index, 1);
                        if (lives <= 0) {
                            gameOver = true;
                        } else {
                            invincible = true;
                            invincibleTimer = 90; // 約1.5秒の無敵時間
                        }
                    }
                });
            }

            if (killCount >= totalEnemies) {
                gameWon = true;
            }
        }

        // 弾を発射
        function fireBullet() {
            if (!gameOver && !gameWon && gameStarted) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y - 15
                });
            }
        }

        // ゲームループ
        function gameLoop() {
            if (!gameStarted) {
                drawTitleScreen();
                scoreElement.textContent = 'SPACE INVADERS';
                messageElement.textContent = isTouchDevice ? 'Tap to start' : 'Press Space to start';
                requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameOver && !gameWon) {
                movePlayer();
                moveBullets();
                moveInvaders();
                invaderShoot();
                checkCollisions();
                replenishInvaders();

                // 無敵タイマー
                if (invincible) {
                    invincibleTimer--;
                    if (invincibleTimer <= 0) {
                        invincible = false;
                    }
                }
            }

            drawPlayer();
            drawInvaders();
            drawBullets();

            // ライフ表示
            drawLives();

            scoreElement.textContent = `SCORE: ${score}  [${killCount}/${totalEnemies}]`;

            if (gameOver) {
                ctx.fillStyle = '#f00';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
                messageElement.textContent = 'R to restart';
            } else if (gameWon) {
                ctx.fillStyle = '#0f0';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
                messageElement.textContent = 'R to restart';
            }

            requestAnimationFrame(gameLoop);
        }

        // === キーボード操作 ===
        let canShoot = true;
        document.addEventListener('keydown', (e) => {
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    startGame();
                }
                e.preventDefault();
                return;
            }
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ' && canShoot) {
                fireBullet();
                canShoot = false;
            }
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            }
            e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === ' ') canShoot = true;
        });

        // === タッチ操作 ===
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnFire = document.getElementById('btnFire');
        const btnRestart = document.getElementById('btnRestart');

        function addDirTouch(btn, keyName) {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyName] = true;
                btn.classList.add('active');
            }, { passive: false });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('active');
            }, { passive: false });
            btn.addEventListener('touchcancel', () => {
                keys[keyName] = false;
                btn.classList.remove('active');
            });
        }

        addDirTouch(btnLeft, 'left');
        addDirTouch(btnRight, 'right');

        // 発射ボタン（連打対応）
        btnFire.addEventListener('touchstart', (e) => {
            e.preventDefault();
            btnFire.classList.add('active');
            fireBullet();
        }, { passive: false });
        btnFire.addEventListener('touchend', (e) => {
            e.preventDefault();
            btnFire.classList.remove('active');
        }, { passive: false });

        // リスタート
        btnRestart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        }, { passive: false });

        // マウス操作（PC用）
        btnLeft.addEventListener('mousedown', () => keys.left = true);
        btnLeft.addEventListener('mouseup', () => keys.left = false);
        btnLeft.addEventListener('mouseleave', () => keys.left = false);
        btnRight.addEventListener('mousedown', () => keys.right = true);
        btnRight.addEventListener('mouseup', () => keys.right = false);
        btnRight.addEventListener('mouseleave', () => keys.right = false);
        btnFire.addEventListener('click', fireBullet);
        btnRestart.addEventListener('click', resetGame);

        // タッチでスタート
        canvas.addEventListener('click', () => {
            if (!gameStarted) startGame();
        });
        canvas.addEventListener('touchstart', (e) => {
            if (!gameStarted) {
                e.preventDefault();
                startGame();
            }
        }, { passive: false });

        // ページスクロール・ズーム完全防止
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gesturestart', (e) => e.preventDefault());

        // ゲーム開始
        gameLoop();
    </script>
</body>
</html>
